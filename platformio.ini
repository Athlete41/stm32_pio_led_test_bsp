; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
default_envs = black_f407zg

; ==================================================== 公共环境 ====================================================
[env]
platform = ststm32
framework = stm32cube
extra_scripts = pre:./scripts/cubemx_bsp_support_3_3_4.py
board_build.stm32cube.custom_config_header = yes
build_flags = 
	-Ilib
	-Itest
	; -DTEST_MODE -DTEST_EXAMPLE ; 测试

build_src_filter = 
	+<./**/*.c>
	+<../test/**/*.c>
	+<../lib/**/*.c>

; ==================================================== STM32F407ZG 环境 ====================================================
[env:black_f407zg]
extends = env
board = black_f407zg

cubemx_core_dir = ./boards/stm32f407zgt6/Core

build_flags = 
	${env.build_flags}
	-Iboards/stm32f407zgt6/CubeMX_Init
	-Iboards/stm32f407zgt6/BSP
	-Wl,--defsym=_Min_Heap_Size=0x200
	-Wl,--defsym=_Min_Stack_Size=0x400

    ; USB CDC
    -DUSE_USB_CDC
    -Iboards/stm32f407zgt6/USB_DEVICE/App
    -Iboards/stm32f407zgt6/USB_DEVICE/Target

build_src_filter = 
	${env.build_src_filter}
	+<../boards/stm32f407zgt6/CubeMX_Init/**/*.c>
	+<../boards/stm32f407zgt6/BSP/**/*.c>

    ; USB CDC
    +<../boards/stm32f407zgt6/USB_DEVICE/App/*.c>
    +<../boards/stm32f407zgt6/USB_DEVICE/Target/*.c>
    +<../boards/stm32f407zgt6/Drivers/STM32F4xx_HAL_Driver/Src/*.c>


upload_protocol = dfu
